# Configuration for cargo-deny
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
# Targets to check dependencies for
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
    { triple = "x86_64-apple-darwin" },
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-pc-windows-msvc" },
]

[advisories]
# The path where the advisory database is cloned/fetched into
db-path = "~/.cargo/advisory-db"
# The url(s) of the advisory databases to use
db-urls = ["https://github.com/rustsec/advisory-db"]
# Unmaintained crate advisories (workspace deps only)
unmaintained = "workspace"
# Yanked crate detection
yanked = "warn"
# A list of advisory IDs to ignore
ignore = [
    # RSA remains required by supported credentials and is isolated behind Marty adapters.
    { id = "RUSTSEC-2023-0071", reason = "required behind Marty crypto adapters; no patched RustCrypto release" },
    # serde_cbor unmaintained — transitive via ssi; no replacement in dep tree
    { id = "RUSTSEC-2021-0127", reason = "transitive via ssi crate; tracked for ssi replacement" },
]

[licenses]
# Licensing confidence threshold (0.0 - 1.0)
confidence-threshold = 0.8
# List of explicitly allowed licenses
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Zlib",
    "0BSD",
]
# List of explicitly denied licenses — handled by allow-list in cargo-deny 0.18+
# Allow 1 or more licenses on a per-crate basis
exceptions = [
    # ring uses a custom license that is permissive but not OSI approved
    { allow = ["OpenSSL", "ISC"], name = "ring" },
    # webpki-roots uses MPL-2.0 which is weak copyleft but commonly used for Mozilla projects
    { allow = ["MPL-2.0"], name = "webpki-roots" },
]

[bans]
# Warn on multiple versions of the same crate
multiple-versions = "warn"
# Skip dependencies that do not have a version number
wildcards = "allow"
# List of crates that are allowed to have multiple versions
skip = []
# List of explicitly denied crates
deny = []

[sources]
# Warn if a crate is from an unknown registry
unknown-registry = "warn"
# Warn if a crate is from a git repository
unknown-git = "warn"
# List of allowed git sources
allow-git = []
