name: License Compliance

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 6 AM UTC
  push:
    branches: [main]
    paths:
      - 'Cargo.toml'
      - '**/Cargo.toml'
      - 'LICENSE-APACHE'
      - 'LICENSE-MIT'
      - 'README.md'
  pull_request:
    branches: [main]
    paths:
      - 'Cargo.toml'
      - '**/Cargo.toml'
      - 'LICENSE-APACHE'
      - 'LICENSE-MIT'
      - 'README.md'

jobs:
  metadata-consistency:
    name: License Metadata Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          path: marty-credentials

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: ElevenID/marty-core
          path: marty-core

      - name: Check license metadata consistency
        working-directory: marty-credentials
        run: |
          set -euo pipefail
          FAIL=0

          CARGO_LICENSE=$(grep '^license' Cargo.toml | head -1 | sed 's/.*= *"//' | sed 's/".*//')
          if [ -z "$CARGO_LICENSE" ]; then
            echo "FAIL: Cargo.toml is missing a license field"
            FAIL=1
          else
            echo "OK: Cargo.toml license = $CARGO_LICENSE"
          fi

          if echo "$CARGO_LICENSE" | grep -q "Apache"; then
            if [ ! -f "LICENSE-APACHE" ]; then
              echo "FAIL: Cargo.toml claims Apache-2.0 but LICENSE-APACHE is missing"
              FAIL=1
            else
              echo "OK: LICENSE-APACHE present"
            fi
          fi

          if echo "$CARGO_LICENSE" | grep -q "MIT"; then
            if [ ! -f "LICENSE-MIT" ]; then
              echo "FAIL: Cargo.toml claims MIT but LICENSE-MIT is missing"
              FAIL=1
            else
              echo "OK: LICENSE-MIT present"
            fi
          fi

          if ! grep -q "^## License" README.md; then
            echo "FAIL: README.md is missing a ## License section"
            FAIL=1
          else
            echo "OK: README.md has License section"
          fi

          exit $FAIL

  dependency-license-inventory:
    name: Dependency License Inventory
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          path: marty-credentials

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: ElevenID/marty-core
          path: marty-core

      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4

      - name: Cache cargo registry
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-license
        run: cargo install cargo-license --locked

      - name: Generate dependency license inventory
        working-directory: marty-credentials
        run: cargo license --json > dependency-licenses.json

      - name: Upload license inventory
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: dependency-licenses
          path: marty-credentials/dependency-licenses.json

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          path: marty-credentials

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: ElevenID/marty-core
          path: marty-core

      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4

      - name: Cache cargo registry
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked

      - name: Generate CycloneDX SBOM
        working-directory: marty-credentials
        run: cargo cyclonedx --format json --override-filename sbom.cdx

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sbom
          path: marty-credentials/sbom.cdx.json
