name: Release Stable

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - '!v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing stable tag to release (for example, v0.2.0)'
        required: true
        type: string

concurrency:
  group: credentials-stable-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  validate-release-source:
    name: Validate immutable release source
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      tag: ${{ steps.target.outputs.tag }}
      version: ${{ steps.target.outputs.version }}
      commit: ${{ steps.identity.outputs.commit }}
    steps:
      - name: Select requested tag
        id: target
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCHED_TAG: ${{ github.event.inputs.tag }}
          PUSHED_TAG: ${{ github.ref_name }}
          WORKFLOW_REF: ${{ github.workflow_ref }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = workflow_dispatch ]; then
            TAG="$DISPATCHED_TAG"
          else
            TAG="$PUSHED_TAG"
          fi
          if [[ ! "$TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "::error::Stable release tag is invalid: $TAG"
            exit 1
          fi
          expected_workflow_ref="$GITHUB_REPOSITORY/.github/workflows/release-stable.yml@refs/tags/$TAG"
          if [ "$WORKFLOW_REF" != "$expected_workflow_ref" ]; then
            echo "::error::Run the stable workflow from the exact release tag ref"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$(printf '%s' "$TAG" | cut -c2-)" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ steps.target.outputs.tag }}
          fetch-depth: 0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: '3.11'

      - name: Bind tag, checkout, and package versions
        id: identity
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_COMMIT: ${{ github.sha }}
          TAG: ${{ steps.target.outputs.tag }}
        run: |
          set -euo pipefail
          COMMIT="$(git rev-parse "$TAG^{commit}")"
          if [ "$EVENT_NAME" = push ] && [ "$COMMIT" != "$PUSH_COMMIT" ]; then
            echo "::error::Tag target $COMMIT does not match push commit $PUSH_COMMIT"
            exit 1
          fi
          git fetch --no-tags origin \
            +refs/heads/main:refs/remotes/origin/main
          python scripts/release_contract.py validate-source --repository . --tag "$TAG" --commit "$COMMIT"
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"

      - name: Reject an existing draft or published release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.target.outputs.tag }}
        run: |
          set -euo pipefail
          gh api --paginate --slurp -H 'X-GitHub-Api-Version: 2026-03-10' \
            "repos/$GITHUB_REPOSITORY/releases?per_page=100" > releases.json
          jq -e --arg tag "$TAG" '([.[][] | select(.tag_name == $tag)] | length) == 0' \
            releases.json >/dev/null

      - name: Reject existing versioned image tags
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.target.outputs.tag }}
        run: |
          set -euo pipefail
          for service in issuance verification; do
            package="marty-credentials-$service"
            gh api --paginate --slurp -H 'X-GitHub-Api-Version: 2026-03-10' \
              "orgs/$GITHUB_REPOSITORY_OWNER/packages/container/$package/versions?per_page=100" \
              > "package-$service.json"
            python scripts/release_contract.py validate-package-tag-absent \
              --json "package-$service.json" --tag "$TAG"
          done

  build-python-wheels:
    name: Build Python Wheels
    needs: validate-release-source
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        target: [x86_64, aarch64]
        exclude:
          - os: windows-latest
            target: aarch64
          - os: ubuntu-latest
            target: aarch64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ needs.validate-release-source.outputs.tag }}
          fetch-depth: 0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: '3.11'
      - name: Build wheels
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b
        with:
          maturin-version: v1.14.1
          working-directory: rust/marty-rs
          target: ${{ matrix.target }}
          args: --locked --release --out ../../dist --features python
          sccache: 'true'
          manylinux: auto
          before-script-linux: yum install -y perl-IPC-Cmd perl-Time-Piece
      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl

  build-wasm:
    name: Build WASM Packages
    needs: validate-release-source
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust/marty-rs
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ needs.validate-release-source.outputs.tag }}
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.15.0 --locked
      - name: Build WASM packages
        run: |
          mkdir -p ../../dist/wasm
          wasm-pack build --locked --target web --no-default-features --features wasm
          mv pkg ../../dist/wasm/web
          wasm-pack build --locked --target nodejs --no-default-features --features wasm
          mv pkg ../../dist/wasm/nodejs
          wasm-pack build --locked --target bundler --no-default-features --features wasm
          mv pkg ../../dist/wasm/bundler
      - name: Create WASM archive
        run: |
          cd ../../dist
          tar -czf marty-rs-wasm.tar.gz wasm/
          sha256sum marty-rs-wasm.tar.gz > checksums-wasm.txt
      - name: Generate SBOM
        run: |
          cargo install cargo-cyclonedx --version 0.5.9 --locked
          cargo cyclonedx --format json --override-filename marty-rs-sbom
          mv marty-rs-sbom.json ../../dist/marty-rs-sbom.json
      - name: Upload WASM artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: wasm-artifacts
          path: |
            dist/marty-rs-wasm.tar.gz
            dist/checksums-wasm.txt
            dist/marty-rs-sbom.json

  build-source-dist:
    name: Build Python Source Distribution
    needs: validate-release-source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ needs.validate-release-source.outputs.tag }}
          fetch-depth: 0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: '3.11'
      - name: Install build tools
        run: python -m pip install build==1.5.0
      - name: Build source distribution
        run: python -m build --sdist --outdir dist
      - name: Upload source dist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: source-dist
          path: dist/*.tar.gz

  test:
    name: Run Tests Before Release
    needs: validate-release-source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ needs.validate-release-source.outputs.tag }}
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
      - name: Run Rust tests
        working-directory: rust/marty-rs
        run: cargo test --locked --no-default-features --features native
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: '3.11'
      - name: Install and test Python package
        run: |
          python -m pip install maturin==1.14.1 pytest==9.1.1
          cd rust/marty-rs
          maturin build --locked --features python --interpreter python --out dist
          python -c "import pathlib, subprocess, sys; subprocess.check_call([sys.executable, '-m', 'pip', 'install', str(next(pathlib.Path('dist').glob('*.whl')))])"
          cd ../..
          pip install -e .[dev]
          pytest tests/

  create-release-draft:
    name: Create complete source-artifact draft
    needs:
      - validate-release-source
      - build-python-wheels
      - build-wasm
      - build-source-dist
      - test
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ needs.validate-release-source.outputs.tag }}
          fetch-depth: 0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: '3.11'
      - name: Download all stable artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: release-artifacts
      - name: Collect the exact stable artifact set
        env:
          TAG: ${{ needs.validate-release-source.outputs.tag }}
        run: |
          set -euo pipefail
          python scripts/release_contract.py collect-stable \
            --source release-artifacts --destination final-release --tag "$TAG"
      - name: Generate release notes
        env:
          TAG: ${{ needs.validate-release-source.outputs.tag }}
        run: |
          set -euo pipefail
          cargo install git-cliff --version 2.13.1 --locked
          git cliff --tag "$TAG" --unreleased --strip all > RELEASE_NOTES.md
      - name: Attest stable artifacts
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a
        with:
          subject-path: 'final-release/*'
      - name: Create draft without overwriting assets
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT: ${{ needs.validate-release-source.outputs.commit }}
          TAG: ${{ needs.validate-release-source.outputs.tag }}
          VERSION: ${{ needs.validate-release-source.outputs.version }}
        run: |
          set -euo pipefail
          gh release create "$TAG" final-release/* \
            --draft \
            --verify-tag \
            --target "$COMMIT" \
            --title "Release $VERSION" \
            --notes-file RELEASE_NOTES.md
      - name: Resolve and validate exact draft
        id: draft
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT: ${{ needs.validate-release-source.outputs.commit }}
          TAG: ${{ needs.validate-release-source.outputs.tag }}
        run: |
          set -euo pipefail
          # Draft releases are not addressable by tag and GitHub can take a
          # moment to return a newly-created draft from the releases listing.
          # Retry only the read; never create another draft or alter the tag.
          RELEASE_ID=""
          for _ in $(seq 1 15); do
            gh api --paginate --slurp -H 'X-GitHub-Api-Version: 2026-03-10' \
              "repos/$GITHUB_REPOSITORY/releases?per_page=100" > releases.json
            matches="$(jq -r --arg tag "$TAG" '[.[][] | select(.tag_name == $tag)] | length' releases.json)"
            if [ "$matches" -eq 1 ]; then
              RELEASE_ID="$(jq -er --arg tag "$TAG" \
                '[.[][] | select(.tag_name == $tag)][0].id' releases.json)"
              break
            fi
            if [ "$matches" -gt 1 ]; then
              echo "::error::More than one draft release is associated with $TAG"
              exit 1
            fi
            sleep 2
          done
          if [ -z "$RELEASE_ID" ]; then
            echo "::error::Draft release for $TAG was not visible after 30 seconds"
            exit 1
          fi
          gh api -H 'X-GitHub-Api-Version: 2026-03-10' \
            "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" > release.json
          python scripts/release_contract.py validate-release \
            --json release.json --release-id "$RELEASE_ID" --tag "$TAG" \
            --commit "$COMMIT" --phase stable-draft
          echo "release_id=$RELEASE_ID" >> "$GITHUB_OUTPUT"
      - name: Start digest-first image publication
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT: ${{ needs.validate-release-source.outputs.commit }}
          RELEASE_ID: ${{ steps.draft.outputs.release_id }}
          TAG: ${{ needs.validate-release-source.outputs.tag }}
        run: |
          set -euo pipefail
          gh api --method POST "repos/$GITHUB_REPOSITORY/dispatches" \
            -f event_type=credentials-release-draft-ready \
            -f "client_payload[tag]=$TAG" \
            -f "client_payload[release_id]=$RELEASE_ID" \
            -f "client_payload[commit_sha]=$COMMIT"
