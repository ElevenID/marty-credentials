name: Release Beta

on:
  push:
    branches:
      - dev
      - main
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+-beta.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Beta version to release (e.g., 0.2.0-beta.1)'
        required: true

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-python-wheels:
    name: Build Python Wheels (${{ matrix.os }}-${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        target: [x86_64, aarch64]
        exclude:
          - os: windows-latest
            target: aarch64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Set beta version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # Generate beta version from commit SHA
            SHORT_SHA=$(git rev-parse --short HEAD)
            BASE_VERSION=$(grep -oP 'version = "\K[^"]+' pyproject.toml || echo "0.1.0")
            VERSION="${BASE_VERSION}-beta.$(date +%Y%m%d).${SHORT_SHA}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building beta version: $VERSION"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ steps.version.outputs.VERSION }}
        with:
          working-directory: rust/marty-rs
          target: ${{ matrix.target }}
          args: --release --out ../../dist --features python
          sccache: 'true'
          manylinux: auto

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl
          retention-days: 7

  publish-to-github-packages:
    name: Publish Beta to GitHub Packages
    needs: [build-python-wheels]
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      
      - name: Install publishing tools
        run: |
          python -m pip install --upgrade pip
          pip install twine build hatchling hatch-vcs
      
      - name: Set beta version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            SHORT_SHA=$(git rev-parse --short HEAD)
            BASE_VERSION=$(grep -oP 'version = "\K[^"]+' pyproject.toml || echo "0.1.0")
            VERSION="${BASE_VERSION}-beta.$(date +%Y%m%d).${SHORT_SHA}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing beta version: $VERSION"
      
      - name: Build source distribution
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ steps.version.outputs.VERSION }}
        run: python -m build --sdist
      
      - name: Configure PyPI repository
        run: |
          cat > ~/.pypirc <<EOF
          [distutils]
          index-servers =
              github

          [github]
          repository = https://pypi.pkg.github.com/ElevenID/
          username = __token__
          password = ${{ secrets.GITHUB_TOKEN }}
          EOF
      
      - name: Publish to GitHub Packages
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create a repository URL for GitHub Packages
          REPO_URL="https://pypi.pkg.github.com/ElevenID/"
          
          # Publish all wheels
          for wheel in dist/*.whl; do
            echo "Publishing $wheel"
            twine upload "$wheel" \
              --repository-url "$REPO_URL" \
              --skip-existing \
              --non-interactive || echo "Warning: Failed to upload $wheel"
          done
          
          # Publish source distribution
          for sdist in dist/*.tar.gz; do
            echo "Publishing $sdist"
            twine upload "$sdist" \
              --repository-url "$REPO_URL" \
              --skip-existing \
              --non-interactive || echo "Warning: Failed to upload $sdist"
          done
      
      - name: Create artifact index
        run: |
          echo "# Beta Release Artifacts" > dist/MANIFEST.md
          echo "" >> dist/MANIFEST.md
          echo "Version: ${{ steps.version.outputs.VERSION }}" >> dist/MANIFEST.md
          echo "Commit: ${{ github.sha }}" >> dist/MANIFEST.md
          echo "" >> dist/MANIFEST.md
          echo "## Wheels" >> dist/MANIFEST.md
          ls -lh dist/*.whl >> dist/MANIFEST.md
          echo "" >> dist/MANIFEST.md
          echo "## Source Distribution" >> dist/MANIFEST.md
          ls -lh dist/*.tar.gz >> dist/MANIFEST.md
      
      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: beta-release-${{ steps.version.outputs.VERSION }}
          path: |
            dist/*.whl
            dist/*.tar.gz
            dist/MANIFEST.md
          retention-days: 30
