name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test-rust:
    name: Rust Tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: marty-credentials/rust/marty-rs
    steps:
      - uses: actions/checkout@v4
        with:
          path: marty-credentials

      - uses: actions/checkout@v4
        with:
          repository: ElevenID/marty-core
          path: marty-core

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test --all-features

      - name: Run clippy
        run: cargo clippy --all-features -- -D warnings

      - name: Check formatting
        run: cargo fmt --all -- --check

  test-python:
    name: Python Tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
        with:
          path: marty-credentials

      - uses: actions/checkout@v4
        with:
          repository: ElevenID/marty-core
          path: marty-core

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install maturin[patchelf] pytest pytest-asyncio

      - name: Build Python package
        working-directory: marty-credentials/rust/marty-rs
        run: maturin develop --features python

      - name: Install Python package
        working-directory: marty-credentials
        run: pip install -e .[dev]

      - name: Run Python tests
        working-directory: marty-credentials
        run: pytest tests/ -v

  test-wasm:
    name: WASM Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: marty-credentials/rust/marty-rs
    steps:
      - uses: actions/checkout@v4
        with:
          path: marty-credentials

      - uses: actions/checkout@v4
        with:
          repository: ElevenID/marty-core
          path: marty-core

      - uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM (web target)
        run: wasm-pack build --target web --features wasm

      - name: Build WASM (nodejs target)
        run: wasm-pack build --target nodejs --features wasm

      - name: Build WASM (bundler target)
        run: wasm-pack build --target bundler --features wasm

      - name: Test WASM
        run: wasm-pack test --node --features wasm
