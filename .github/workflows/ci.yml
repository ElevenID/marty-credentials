name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Private git dep auth — allows Cargo to clone ElevenID repos
  GIT_AUTH_CONFIGURED: "true"

jobs:
  test-rust:
    name: Rust Tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: marty-credentials/rust/marty-rs
    steps:
      - uses: actions/checkout@v4
        with:
          path: marty-credentials

      - uses: actions/checkout@v4
        with:
          repository: ElevenID/marty-core
          path: marty-core

      - name: Configure Git auth for private repos
        run: git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test --all-features

      - name: Run clippy
        run: cargo clippy --all-features -- -D warnings

      - name: Check formatting
        run: cargo fmt --all -- --check

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: marty-credentials

      - uses: actions/checkout@v4
        with:
          repository: ElevenID/marty-core
          path: marty-core

      - name: Configure Git auth for private repos
        run: git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo-audit
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: ${{ runner.os }}-cargo-audit

      - name: Install cargo-audit
        run: |
          if ! command -v cargo-audit &> /dev/null; then
            cargo install cargo-audit --locked
          fi

      - name: Run cargo-audit
        continue-on-error: true
        working-directory: marty-credentials
        run: cargo audit

      - name: Cache cargo-deny
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-deny
          key: ${{ runner.os }}-cargo-deny

      - name: Install cargo-deny
        run: |
          if ! command -v cargo-deny &> /dev/null; then
            cargo install cargo-deny --locked
          fi

      - name: Run cargo-deny
        continue-on-error: true
        working-directory: marty-credentials
        run: cargo deny check

  python-security:
    name: Python Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: marty-credentials

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit[toml] safety

      - name: Run bandit
        continue-on-error: true
        working-directory: marty-credentials
        run: bandit -r python/marty_credentials/

      - name: Run safety check
        continue-on-error: true
        working-directory: marty-credentials
        run: safety check

  canvas-portable-migration:
    name: Canvas PostgreSQL Migration Contract
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      CANVAS_MIGRATION_SOURCE_REVISION: ${{ github.sha }}
      COMPOSE_PROJECT_NAME: canvas-portable-migration-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: marty-credentials

      - name: Validate disposable migration topology
        working-directory: marty-credentials
        run: docker compose --file docker-compose.canvas-migration-contract.yml config --quiet

      - name: Build migration contract image
        working-directory: marty-credentials
        run: |
          mkdir -p tests/artifacts/canvas-portable-migration
          docker compose --file docker-compose.canvas-migration-contract.yml build --pull migration-contract

      - name: Exercise upgrade and exact downgrade restoration
        working-directory: marty-credentials
        run: >-
          docker compose --file docker-compose.canvas-migration-contract.yml
          up --force-recreate --abort-on-container-exit
          --exit-code-from migration-contract migration-contract

      - name: Require successful sanitized contract evidence
        working-directory: marty-credentials
        run: |
          test "$(jq -r '.status' tests/artifacts/canvas-portable-migration/contract-result.json)" = passed
          test "$(jq -r '.baseline_revision' tests/artifacts/canvas-portable-migration/contract-result.json)" = derive_server_owned_claims
          test "$(jq -r '.portable_revision' tests/artifacts/canvas-portable-migration/contract-result.json)" = portable_canvas_connections
          test "$(jq -r '.execution_boundary' tests/artifacts/canvas-portable-migration/contract-result.json)" = docker_compose_one_shot
          test "$(jq -r '.source_revision' tests/artifacts/canvas-portable-migration/contract-result.json)" = "$GITHUB_SHA"

      - name: Upload Canvas migration evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: canvas-portable-migration-${{ github.run_id }}-${{ github.run_attempt }}
          path: marty-credentials/tests/artifacts/canvas-portable-migration/contract-result.json
          if-no-files-found: warn
          retention-days: 14

      - name: Remove disposable migration stack
        if: always()
        working-directory: marty-credentials
        run: docker compose --file docker-compose.canvas-migration-contract.yml down --volumes --remove-orphans

  test-python:
    name: Python Tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
        with:
          path: marty-credentials

      - uses: actions/checkout@v4
        with:
          repository: ElevenID/marty-core
          path: marty-core

      - name: Configure Git auth for private repos
        run: git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install maturin[patchelf] pytest pytest-asyncio

      - name: Build Python package
        working-directory: marty-credentials/rust/marty-rs
        run: maturin develop --features python

      - name: Install Python package
        working-directory: marty-credentials
        run: pip install -e .[dev]

      - name: Verify issuance migration graph has one head
        working-directory: marty-credentials/services/issuance/infrastructure/migrations
        run: python -m alembic -c alembic.ini heads

      - name: Run Python tests
        working-directory: marty-credentials
        run: pytest tests/ -v

  test-wasm:
    name: WASM Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: marty-credentials/rust/marty-rs
    steps:
      - uses: actions/checkout@v4
        with:
          path: marty-credentials

      - uses: actions/checkout@v4
        with:
          repository: ElevenID/marty-core
          path: marty-core

      - name: Configure Git auth for private repos
        run: git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM (web target)
        run: wasm-pack build --target web --features wasm

      - name: Build WASM (nodejs target)
        run: wasm-pack build --target nodejs --features wasm

      - name: Build WASM (bundler target)
        run: wasm-pack build --target bundler --features wasm

      - name: Test WASM
        run: wasm-pack test --node --features wasm
