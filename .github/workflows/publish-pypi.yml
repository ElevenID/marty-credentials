name: Publish immutable Python release

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
      release_id:
        required: true
        type: string
      commit_sha:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: Immutable stable tag to publish
        required: true
        type: string
      release_id:
        description: Numeric ID of the published immutable release
        required: true
        type: string
      commit_sha:
        description: Full commit SHA targeted by the release tag
        required: true
        type: string

concurrency:
  group: credentials-pypi-${{ inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish-python:
    if: vars.ENABLE_PUBLIC_REGISTRY_PUBLISHING == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      attestations: read
      contents: read
      id-token: write
    steps:
      - name: Validate dispatch contract
        shell: bash
        env:
          COMMIT: ${{ inputs.commit_sha }}
          RELEASE_ID: ${{ inputs.release_id }}
          TAG: ${{ inputs.tag }}
          WORKFLOW_REF: ${{ github.workflow_ref }}
        run: |
          set -euo pipefail
          case "$WORKFLOW_REF" in
            "$GITHUB_REPOSITORY/.github/workflows/release-images.yml@refs/heads/main"|\
            "$GITHUB_REPOSITORY/.github/workflows/publish-pypi.yml@refs/heads/main")
              ;;
            *)
              echo "::error::PyPI publication must use a workflow from protected main"
              exit 1
              ;;
          esac
          if [[ ! "$TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "::error::Stable release tag is invalid: $TAG"
            exit 1
          fi
          if [[ ! "$RELEASE_ID" =~ ^[1-9][0-9]*$ ]]; then
            echo "::error::Release ID must be a positive integer"
            exit 1
          fi
          if [[ ! "$COMMIT" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Commit must be a full lowercase SHA"
            exit 1
          fi

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Download the attested source distribution
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT: ${{ inputs.commit_sha }}
          RELEASE_ID: ${{ inputs.release_id }}
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin \
            +refs/heads/main:refs/remotes/origin/main
          python scripts/release_contract.py validate-source \
            --repository . --tag "$TAG" --commit "$COMMIT"
          gh api -H 'X-GitHub-Api-Version: 2026-03-10' \
            "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" > release.json
          python scripts/release_contract.py validate-release \
            --json release.json --release-id "$RELEASE_ID" --tag "$TAG" \
            --commit "$COMMIT" --phase published

          VERSION="${TAG#v}"
          ASSET="marty_credentials-$VERSION.tar.gz"
          mkdir -p dist evidence
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" \
            --pattern "$ASSET" --dir dist
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" \
            --pattern SHA256SUMS --dir evidence
          EXPECTED="$(awk -v asset="$ASSET" '$2 == asset { print $1 }' evidence/SHA256SUMS)"
          if [[ ! "$EXPECTED" =~ ^[0-9a-f]{64}$ ]]; then
            echo "::error::Published checksum manifest has no unique source distribution digest"
            exit 1
          fi
          echo "$EXPECTED  dist/$ASSET" | sha256sum -c -
          gh attestation verify "dist/$ASSET" \
            --repo "$GITHUB_REPOSITORY" \
            --signer-workflow \
            "$GITHUB_REPOSITORY/.github/workflows/release-stable.yml" \
            --source-ref "refs/tags/$TAG" \
            --source-digest "$COMMIT" \
            --deny-self-hosted-runners

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
