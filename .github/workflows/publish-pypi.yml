name: Publish Python packages

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build-python:
    if: vars.ENABLE_PUBLIC_REGISTRY_PUBLISHING == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - run: python -m pip install build hatchling hatch-vcs
      - run: python -m build
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v6
        with:
          name: marty-credentials-python
          path: dist/*
          retention-days: 7

  publish-python:
    if: vars.ENABLE_PUBLIC_REGISTRY_PUBLISHING == 'true'
    needs: build-python
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v6
        with:
          name: marty-credentials-python
          path: dist
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
