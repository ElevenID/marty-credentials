name: Release service images

on:
  repository_dispatch:
    types: [credentials-release-published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing GitHub release tag to publish as images
        required: true
        type: string

concurrency:
  group: images-${{ github.event.client_payload.tag || inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    strategy:
      matrix:
        include:
          - service: issuance
            dockerfile: services/Dockerfile
          - service: verification
            dockerfile: services/verification/Dockerfile
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.client_payload.tag || inputs.tag }}
      - name: Download and verify immutable release dependencies
        id: deps
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.client_payload.tag || inputs.tag }}
        run: |
          set -euo pipefail
          jq -e '.schema == "marty.release-dependencies/v1"' release/dependencies.json >/dev/null
          mkdir release-deps

          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" \
            --pattern 'marty_rs-*-manylinux*x86_64.whl' --dir release-deps
          mv release-deps/marty_rs-*-manylinux*x86_64.whl release-deps/marty_rs.whl

          for dependency in marty-msf marty-common; do
            repository=$(jq -r ".[\"$dependency\"].repository" release/dependencies.json)
            release_tag=$(jq -r ".[\"$dependency\"].tag" release/dependencies.json)
            asset=$(jq -r ".[\"$dependency\"].asset" release/dependencies.json)
            expected=$(jq -r ".[\"$dependency\"].sha256" release/dependencies.json)
            gh release download "$release_tag" --repo "$repository" --pattern "$asset" --dir release-deps
            echo "$expected  release-deps/$asset" | sha256sum -c -
          done

          mv "release-deps/$(jq -r '.["marty-msf"].asset' release/dependencies.json)" release-deps/marty_msf.whl
          mv "release-deps/$(jq -r '.["marty-common"].asset' release/dependencies.json)" release-deps/marty_common.whl

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "marty_rs_sha256=$(sha256sum release-deps/marty_rs.whl | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "marty_msf_sha256=$(jq -r '.["marty-msf"].sha256' release/dependencies.json)" >> "$GITHUB_OUTPUT"
          echo "marty_common_sha256=$(jq -r '.["marty-common"].sha256' release/dependencies.json)" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ghcr.io/elevenid/marty-credentials-${{ matrix.service }}:${{ steps.deps.outputs.tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.deps.outputs.tag }}
          build-args: |
            MARTY_RS_SHA256=${{ steps.deps.outputs.marty_rs_sha256 }}
            MARTY_MSF_SHA256=${{ steps.deps.outputs.marty_msf_sha256 }}
            MARTY_COMMON_SHA256=${{ steps.deps.outputs.marty_common_sha256 }}
          provenance: mode=max
          sbom: true
      - uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661
        with:
          subject-name: ghcr.io/elevenid/marty-credentials-${{ matrix.service }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
      - uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159
      - name: Sign image by digest
        env:
          IMAGE: ghcr.io/elevenid/marty-credentials-${{ matrix.service }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "$IMAGE@$DIGEST"
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          image: ghcr.io/elevenid/marty-credentials-${{ matrix.service }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: marty-credentials-${{ matrix.service }}.spdx.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: image-evidence-${{ matrix.service }}
          path: marty-credentials-${{ matrix.service }}.spdx.json
          retention-days: 7

      - name: Record immutable image digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: printf '%s\n' "$DIGEST" > marty-credentials-${{ matrix.service }}.digest

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: image-digest-${{ matrix.service }}
          path: marty-credentials-${{ matrix.service }}.digest
          retention-days: 7

  attach-evidence:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: image-*
          path: release-assets
          merge-multiple: true
      - name: Create checksums
        run: (cd release-assets && sha256sum * > SHA256SUMS)
      - uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661
        with:
          subject-path: release-assets/**
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          tag_name: ${{ github.event.client_payload.tag || inputs.tag }}
          generate_release_notes: true
          files: release-assets/**
