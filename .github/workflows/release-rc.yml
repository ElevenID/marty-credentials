name: Release RC

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'RC tag to release (e.g., v0.2.0-rc.1)'
        required: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-python-wheels:
    name: Build Python Wheels
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        target: [x86_64, aarch64]
        exclude:
          - os: windows-latest
            target: aarch64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.11'

      - name: Build wheels
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b
        with:
          # Avoid the action's latest-release GitHub API lookup.
          maturin-version: v1.14.1
          working-directory: rust/marty-rs
          target: ${{ matrix.target }}
          args: --locked --release --out ../../dist --features python
          sccache: 'true'
          manylinux: auto
          before-script-linux: yum install -y perl-IPC-Cmd perl-Time-Piece

      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl

  build-wasm:
    name: Build WASM Packages
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust/marty-rs
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM packages
        run: |
          mkdir -p ../../dist/wasm
          
          # Build for web
          wasm-pack build --locked --target web --no-default-features --features wasm
          mv pkg ../../dist/wasm/web
          
          # Build for nodejs
          wasm-pack build --locked --target nodejs --no-default-features --features wasm
          mv pkg ../../dist/wasm/nodejs
          
          # Build for bundler
          wasm-pack build --locked --target bundler --no-default-features --features wasm
          mv pkg ../../dist/wasm/bundler

      - name: Create WASM archive
        run: |
          cd ../../dist
          tar -czf marty-rs-wasm.tar.gz wasm/
          sha256sum marty-rs-wasm.tar.gz > checksums-wasm.txt

      - name: Generate SBOM
        run: |
          cargo install cargo-cyclonedx --locked
          cargo cyclonedx --format json --override-filename marty-rs-sbom
          mv marty-rs-sbom.json ../../dist/marty-rs-sbom.json

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: wasm-artifacts
          path: |
            dist/marty-rs-wasm.tar.gz
            dist/checksums-wasm.txt
            dist/marty-rs-sbom.json

  build-source-dist:
    name: Build Python Source Distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build hatch

      - name: Build source distribution
        run: python -m build --sdist --outdir dist

      - name: Upload source dist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: source-dist
          path: dist/*.tar.gz

  create-release:
    permissions:
      contents: write
      id-token: write # Required for attestations.
      attestations: write
    name: Create RC Release
    needs: [build-python-wheels, build-wasm, build-source-dist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${GITHUB_EVENT_INPUTS_TAG}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_EVENT_INPUTS_TAG: ${{ github.event.inputs.tag }}

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: release-artifacts

      - name: Consolidate artifacts
        run: |
          mkdir -p final-release
          find release-artifacts -type f -exec cp {} final-release/ \;
          cd final-release
          sha256sum ./* > SHA256SUMS

      - name: Generate release notes
        run: |
          cargo install git-cliff
          git cliff --tag ${{ steps.version.outputs.tag }} --unreleased --strip all > RELEASE_NOTES.md

      - name: Generate attestations
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a
        with:
          subject-path: 'final-release/*.tar.gz'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.version }} (RC)
          body_path: RELEASE_NOTES.md
          files: final-release/*
          prerelease: true
          generate_release_notes: true
